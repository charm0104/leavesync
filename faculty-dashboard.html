<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Faculty Dashboard - LMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  overflow:hidden;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#7c3aed,#6d28d9);
  color:white;
  padding:40px 25px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.sidebar h2{
  margin-bottom:40px;
}

.menu button{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  padding:12px 15px;
  margin-bottom:12px;
  border-radius:10px;
  text-align:left;
  cursor:pointer;
  transition:0.3s;
}

.menu button:hover,
.menu button.active{
  background:rgba(255,255,255,0.2);
}

.logout{
  padding:10px;
  background:#ef4444;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* MAIN */

.main{
  flex:1;
  padding:50px 60px;
  overflow-y:auto;
}

.section{
  display:none;
  animation:fade 0.4s ease;
}

.section.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.card{
  background:white;
  padding:25px;
  border-radius:16px;
  box-shadow:0 20px 45px rgba(0,0,0,0.06);
  margin-bottom:30px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

/* STAT CARDS */

.stats{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  margin-bottom:30px;
}

.stat-card{
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 15px 40px rgba(0,0,0,0.06);
}

.stat-card h3{
  font-size:14px;
  color:#64748b;
  margin-bottom:8px;
}

.stat-card p{
  font-size:22px;
  font-weight:700;
}

/* TABLE */

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  text-align:left;
}

th{
  background:#7c3aed;
  color:white;
}

tr:nth-child(even){
  background:#f8fafc;
}

textarea{
  width:100%;
  padding:6px;
  border-radius:6px;
  border:1px solid #ddd;
}

button.action{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin-right:5px;
}

.approve{
  background:#22c55e;
  color:white;
}

.reject{
  background:#ef4444;
  color:white;
}

.status{
  padding:5px 10px;
  border-radius:20px;
  font-size:12px;
}

.pending{ background:#facc15; }
.approved{ background:#22c55e; color:white; }
.rejected{ background:#ef4444; color:white; }

</style>
</head>

<body>

<div class="sidebar">
  <div>
    <h2>👩‍🏫 Faculty Panel</h2>
    <div class="menu">
      <button onclick="showSection('dashboard',this)" class="active">Dashboard</button>
      <button onclick="showSection('requests',this)">Leave Requests</button>
      <button onclick="showSection('statistics',this)">Statistics</button>
    </div>
  </div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

  <div class="header">
    <h1>Faculty Dashboard</h1>
    <div>👤 <span id="username"></span></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="section active">
    <div class="stats">
      <div class="stat-card">
        <h3>Total Requests</h3>
        <p id="totalCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Approved</h3>
        <p id="approvedCount">0</p>
      </div>
      <div class="stat-card">
        <h3>Pending</h3>
        <p id="pendingCount">0</p>
      </div>
    </div>
  </div>

  <!-- REQUESTS -->
  <div id="requests" class="section">
    <div class="card">
      <h2>Student Leave Requests</h2>
      <table>
        <thead>
          <tr>
            <th>From</th>
            <th>To</th>
            <th>Reason</th>
            <th>Status</th>
            <th>Remarks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="leaveTable"></tbody>
      </table>
    </div>
  </div>

  <!-- STATISTICS -->
  <div id="statistics" class="section">
    <div class="card">
      <h2>Approval Overview</h2>
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<script>

if(localStorage.getItem("role")!=="faculty"){
  window.location.href="index.html";
}

document.getElementById("username").innerText =
  localStorage.getItem("username");

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

function showSection(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function load(){

  let leaves=JSON.parse(localStorage.getItem("leaves"))||[];
  let table=document.getElementById("leaveTable");
  table.innerHTML="";

  let approved=0;
  let pending=0;

  leaves.forEach((l,i)=>{

    if(l.status==="Approved") approved++;
    if(l.status==="Pending") pending++;

    table.innerHTML+=`
      <tr>
        <td>${l.from}</td>
        <td>${l.to}</td>
        <td>${l.reason}</td>
        <td><span class="status ${l.status.toLowerCase()}">${l.status}</span></td>
        <td><textarea id="remark-${i}">${l.remark||""}</textarea></td>
        <td>
          <button class="action approve" onclick="updateStatus(${i},'Approved')">Approve</button>
          <button class="action reject" onclick="updateStatus(${i},'Rejected')">Reject</button>
        </td>
      </tr>
    `;
  });

  document.getElementById("totalCount").innerText=leaves.length;
  document.getElementById("approvedCount").innerText=approved;
  document.getElementById("pendingCount").innerText=pending;

  generateChart(approved,pending);
}

function updateStatus(index,status){
  let leaves=JSON.parse(localStorage.getItem("leaves"))||[];
  leaves[index].status=status;
  leaves[index].remark=document.getElementById("remark-"+index).value;
  localStorage.setItem("leaves",JSON.stringify(leaves));
  load();
}

function generateChart(approved,pending){

  if(window.chartInstance){
    window.chartInstance.destroy();
  }

  window.chartInstance=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{
      labels:["Approved","Pending"],
      datasets:[{
        data:[approved,pending],
        backgroundColor:["#22c55e","#facc15"]
      }]
    },
    options:{
      plugins:{ legend:{ position:"bottom" } }
    }
  });
}

load();

</script>

</body>
</html>
