<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard - LMS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  display:flex;
  height:100vh;
  background:linear-gradient(135deg,#eef2ff,#f8fafc);
  overflow:hidden;
}

/* SIDEBAR */

.sidebar{
  width:260px;
  background:linear-gradient(180deg,#1e3a8a,#2563eb);
  color:white;
  padding:40px 25px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.sidebar h2{
  font-size:22px;
  margin-bottom:40px;
}

.menu button{
  width:100%;
  background:transparent;
  border:none;
  color:white;
  padding:12px 15px;
  margin-bottom:12px;
  border-radius:10px;
  text-align:left;
  cursor:pointer;
  transition:0.3s;
  font-size:14px;
}

.menu button:hover,
.menu button.active{
  background:rgba(255,255,255,0.2);
}

.logout{
  padding:10px;
  background:#ef4444;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* MAIN */

.main{
  flex:1;
  padding:50px 60px;
  overflow-y:auto;
}

.section{
  display:none;
  animation:fade 0.4s ease;
}

.section.active{
  display:block;
}

@keyframes fade{
  from{opacity:0; transform:translateY(15px);}
  to{opacity:1; transform:translateY(0);}
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 20px 45px rgba(0,0,0,0.06);
  margin-bottom:35px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
}

.card h2{
  margin-bottom:15px;
}

input,textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border-radius:8px;
  border:1px solid #e2e8f0;
}

button.primary{
  background:#2563eb;
  border:none;
  padding:12px 18px;
  color:white;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button.primary:hover{
  background:#1e40af;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:14px;
  text-align:left;
}

th{
  background:#1e3a8a;
  color:white;
}

tr:nth-child(even){
  background:#f8fafc;
}

.status{
  padding:5px 12px;
  border-radius:20px;
  font-size:12px;
}

.pending{ background:#facc15; }
.approved{ background:#22c55e; color:white; }
.rejected{ background:#ef4444; color:white; }

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.username{
  font-weight:600;
}
</style>
</head>

<body>

<div class="sidebar">
  <div>
    <h2>🎓 LMS</h2>
    <div class="menu">
      <button onclick="showSection('dashboard',this)" class="active">Dashboard</button>
      <button onclick="showSection('apply',this)">Apply Leave</button>
      <button onclick="showSection('history',this)">Leave History</button>
    </div>
  </div>
  <button class="logout" onclick="logout()">Logout</button>
</div>

<div class="main">

  <div class="header">
    <h1>Student Dashboard</h1>
    <div class="username" id="username"></div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="section active">
    <div class="card">
      <h2>Monthly Leave Overview</h2>
      <canvas id="chart"></canvas>
    </div>
  </div>

  <!-- APPLY -->
  <div id="apply" class="section">
    <div class="card">
      <h2>Apply for Leave</h2>
      <form onsubmit="submitLeave(event)">
        <input type="date" id="from" required>
        <input type="date" id="to" required>
        <textarea id="reason" placeholder="Reason" required></textarea>
        <button class="primary">Submit Leave</button>
      </form>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="history" class="section">
    <div class="card">
      <h2>Leave History</h2>
      <table>
        <thead>
          <tr>
            <th>From</th>
            <th>To</th>
            <th>Reason</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="historyTable"></tbody>
      </table>
    </div>
  </div>

</div>

<script>

if(localStorage.getItem("role")!=="student"){
  window.location.href="index.html";
}

document.getElementById("username").innerText =
  "👤 "+localStorage.getItem("username");

function logout(){
  localStorage.clear();
  window.location.href="index.html";
}

function showSection(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".menu button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function load(){
  let leaves=JSON.parse(localStorage.getItem("leaves"))||[];
  let table=document.getElementById("historyTable");
  table.innerHTML="";

  leaves.forEach(l=>{
    table.innerHTML+=`
      <tr>
        <td>${l.from}</td>
        <td>${l.to}</td>
        <td>${l.reason}</td>
        <td><span class="status ${l.status.toLowerCase()}">${l.status}</span></td>
      </tr>
    `;
  });

  generateChart(leaves);
}

function submitLeave(e){
  e.preventDefault();

  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  let reason=document.getElementById("reason").value;

  let leaves=JSON.parse(localStorage.getItem("leaves"))||[];
  leaves.push({from,to,reason,status:"Pending"});

  localStorage.setItem("leaves",JSON.stringify(leaves));

  load();

  // Redirect to history section automatically
  showSection('history', document.querySelectorAll(".menu button")[2]);
}

function generateChart(leaves){

  let months=new Array(12).fill(0);

  leaves.forEach(l=>{
    let m=new Date(l.from).getMonth();
    months[m]+=1;
  });

  if(window.chartInstance){
    window.chartInstance.destroy();
  }

  window.chartInstance = new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{
      labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
      datasets:[{
        label:"Leaves per Month",
        data:months,
        backgroundColor:"#2563eb",
        borderRadius:6
      }]
    },
    options:{
      animation:{ duration:1000 },
      plugins:{ legend:{ display:false } },
      scales:{ y:{ beginAtZero:true } }
    }
  });
}

load();

</script>

</body>
</html>
