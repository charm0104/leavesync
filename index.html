<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMS - Leave Management System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  height:100vh;
  background:#f3f6fb;
  display:flex;
  justify-content:center;
  align-items:center;
}

.container{
  width:1000px;
  height:600px;
  display:flex;
  border-radius:18px;
  overflow:hidden;
  background:white;
  box-shadow:0 30px 60px rgba(0,0,0,0.08);
  transition:0.4s ease;
}

/* LEFT PANEL */

.info{
  width:45%;
  background:linear-gradient(135deg,#1e40af,#2563eb);
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:60px;
  text-align:center;
}

.info h1{
  font-size:28px;
  margin-bottom:20px;
}

.info p{
  font-size:14px;
  opacity:0.9;
}

.switch-btn{
  margin-top:35px;
  padding:12px 30px;
  border-radius:30px;
  border:2px solid white;
  background:transparent;
  color:white;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

.switch-btn:hover{
  background:white;
  color:#1e40af;
}

/* FORMS */

.forms{
  width:55%;
  position:relative;
  overflow:hidden;
}

.form{
  position:absolute;
  width:100%;
  height:100%;
  padding:80px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  transition:0.5s ease;
  opacity:0;
}

.form.login{ left:0; opacity:1; }
.form.signup{ left:100%; }

.container.active .form.login{
  left:-100%;
  opacity:0;
}

.container.active .form.signup{
  left:0;
  opacity:1;
}

.form h2{
  margin-bottom:25px;
  font-size:24px;
}

input, select{
  margin:12px 0;
  padding:14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  font-size:14px;
  transition:0.3s;
}

input:focus, select:focus{
  border-color:#1e40af;
  outline:none;
}

button.submit{
  margin-top:25px;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#1e40af;
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button.submit:hover{
  background:#2563eb;
}
</style>
</head>

<body>

<div class="container" id="container">

  <div class="info">
    <h1>Leave Management System</h1>
    <p>Professional leave management for students and faculty</p>
    <button class="switch-btn" id="switchBtn" onclick="toggleSlide()">Create Account</button>
  </div>

  <div class="forms">

    <!-- LOGIN -->
    <div class="form login">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">

      <select id="loginRole">
        <option value="">Select Role</option>
        <option value="student">🎓 Student</option>
        <option value="faculty">👩‍🏫 Faculty</option>
      </select>

      <button class="submit" onclick="login()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div class="form signup">
      <h2>Create Account</h2>
      <input type="text" id="signupName" placeholder="Full Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">

      <select id="signupRole">
        <option value="">Select Role</option>
        <option value="student">🎓 Student</option>
        <option value="faculty">👩‍🏫 Faculty</option>
      </select>

      <button class="submit" onclick="register()">Register</button>
    </div>

  </div>
</div>

<script>

function toggleSlide(){
  const container=document.getElementById("container");
  const btn=document.getElementById("switchBtn");

  container.classList.toggle("active");

  btn.innerText = container.classList.contains("active")
    ? "Back to Login"
    : "Create Account";
}

/* REGISTER */
function register(){

  const name=document.getElementById("signupName").value.trim();
  const email=document.getElementById("signupEmail").value.trim();
  const pass=document.getElementById("signupPassword").value.trim();
  const role=document.getElementById("signupRole").value;

  if(!name || !email || !pass || !role){
    alert("Please fill all fields");
    return;
  }

  let users=JSON.parse(localStorage.getItem("users")) || [];

  if(users.find(u=>u.email===email)){
    alert("User already exists");
    return;
  }

  users.push({name,email,pass,role});
  localStorage.setItem("users",JSON.stringify(users));

  alert("Registered successfully!");
  toggleSlide();
}

/* LOGIN */
function login(){

  const email=document.getElementById("loginEmail").value.trim();
  const pass=document.getElementById("loginPassword").value.trim();
  const role=document.getElementById("loginRole").value;

  if(!email || !pass || !role){
    alert("Please fill all fields");
    return;
  }

  let users=JSON.parse(localStorage.getItem("users")) || [];

  const user=users.find(u =>
    u.email===email &&
    u.pass===pass &&
    u.role===role
  );

  if(!user){
    alert("Invalid credentials");
    return;
  }

  localStorage.setItem("username",user.name);
  localStorage.setItem("role",user.role);

  window.location.href = role + "-dashboard.html";
}

</script>

</body>
</html>
